<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>카페스팟 | 미팅하기 좋은 카페 찾기</title>
<meta name="description" content="미팅·상담·공부하기 좋은 카페를 찾아드려요.">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Apple SD Gothic Neo','Noto Sans KR',sans-serif; background: #f7f6f3; color: #1a1a1a; min-height: 100vh; }
.wrap { max-width: 480px; margin: 0 auto; padding: 0 16px 120px; }
header { text-align: center; padding: 36px 0 20px; }
.logo { font-size: 26px; font-weight: 700; color: #534AB7; }
.tagline { font-size: 13px; color: #888; margin-top: 4px; }
.trust-banner { background: #EEEDFE; border-radius: 12px; padding: 12px 16px; text-align: center; font-size: 14px; color: #3C3489; font-weight: 500; margin-bottom: 20px; }
.trust-num { font-size: 18px; font-weight: 700; }
.section { margin-bottom: 20px; }
.section-title { font-size: 13px; font-weight: 600; color: #888; margin-bottom: 10px; }
.search-box { position: relative; }
.search-input { width: 100%; padding: 14px 48px 14px 16px; border-radius: 12px; border: 1.5px solid #e0e0e0; font-size: 15px; background: #fff; color: #1a1a1a; outline: none; transition: border-color .15s; font-family: inherit; }
.search-input:focus { border-color: #534AB7; }
.search-input::placeholder { color: #bbb; }
.suggest-list { background: #fff; border: 1.5px solid #e0e0e0; border-radius: 12px; margin-top: 6px; overflow: hidden; display: none; }
.suggest-item { padding: 12px 16px; font-size: 14px; cursor: pointer; border-bottom: 1px solid #f5f5f5; }
.suggest-item:last-child { border-bottom: none; }
.suggest-item:hover { background: #f7f6f3; }
.suggest-item-name { font-weight: 600; color: #1a1a1a; }
.suggest-item-addr { font-size: 12px; color: #aaa; margin-top: 2px; }
.quick-stations { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 10px; }
.quick-chip { padding: 6px 13px; border-radius: 20px; border: 1.5px solid #e0e0e0; font-size: 12px; color: #555; background: #fff; cursor: pointer; }
.quick-chip:hover { border-color: #AFA9EC; color: #3C3489; }
.filter-row { display: flex; flex-wrap: wrap; gap: 8px; }
.chip { padding: 7px 14px; border-radius: 20px; border: 1.5px solid #e0e0e0; font-size: 13px; color: #555; background: #fff; cursor: pointer; user-select: none; }
.chip.on { background: #EEEDFE; border-color: #AFA9EC; color: #3C3489; font-weight: 600; }
.chip.on.green { background: #E1F5EE; border-color: #5DCAA5; color: #085041; }
.cta-wrap { position: fixed; bottom: 0; left: 0; right: 0; padding: 12px 16px 28px; background: rgba(247,246,243,0.96); backdrop-filter: blur(8px); border-top: 1px solid #e8e8e8; z-index: 100; }
.cta-wrap-inner { max-width: 480px; margin: 0 auto; }
.cta-btn { width: 100%; padding: 16px; background: #534AB7; color: #fff; font-size: 16px; font-weight: 700; border: none; border-radius: 14px; cursor: pointer; font-family: inherit; }
.cta-btn:disabled { background: #bbb; cursor: not-allowed; }
.result-header { display: none; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.result-count { font-size: 15px; font-weight: 700; }
.result-sub { font-size: 12px; color: #aaa; }
.cafe-list { display: none; flex-direction: column; gap: 12px; }
.cafe-card { background: #fff; border-radius: 14px; border: 1.5px solid #ebebeb; padding: 14px 16px; }
.cafe-card-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 5px; }
.cafe-name { font-size: 15px; font-weight: 700; }
.cafe-dist { font-size: 12px; color: #534AB7; font-weight: 600; background: #EEEDFE; padding: 3px 8px; border-radius: 8px; white-space: nowrap; margin-left: 8px; flex-shrink: 0; }
.cafe-addr { font-size: 12px; color: #999; margin-bottom: 8px; }
.cafe-card-footer { margin-top: 10px; padding-top: 10px; border-top: 1px solid #f0f0f0; display: flex; gap: 8px; }
.action-btn { flex: 1; padding: 9px; border-radius: 10px; font-size: 12px; font-weight: 600; text-align: center; text-decoration: none; display: block; }
.action-btn.naver { border: 1.5px solid #03C75A; color: #03C75A; background: #fff; }
.action-btn.kakao { border: 1.5px solid #FAE100; color: #3A1D1D; background: #FAE100; }
.loading { text-align: center; padding: 40px; display: none; }
.spinner { width: 32px; height: 32px; border: 3px solid #EEEDFE; border-top-color: #534AB7; border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 12px; }
@keyframes spin { to { transform: rotate(360deg); } }
.empty-state { text-align: center; padding: 40px; color: #aaa; font-size: 14px; display: none; }
.share-btn { width: 100%; padding: 13px; border-radius: 12px; border: 1.5px solid #e0e0e0; background: #fff; font-size: 14px; font-weight: 600; color: #555; cursor: pointer; margin-top: 8px; display: none; font-family: inherit; }
footer { text-align: center; padding: 24px 0 0; font-size: 11px; color: #ccc; }
</style>
<script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=8eca480144ca793268bb8ebcf039be92&libraries=services"></script>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">카페스팟</div>
    <div class="tagline">미팅·상담·공부하기 좋은 카페를 찾아드려요</div>
  </header>
  <div class="trust-banner">오늘 <span class="trust-num" id="trust-num">1,284</span>명이 카페스팟으로 미팅을 잡았어요</div>
  <div class="section">
    <div class="section-title">어디서 만나실 예정인가요?</div>
    <div class="search-box">
      <input type="text" class="search-input" id="location-input" placeholder="역 이름이나 주소를 입력하세요 (예: 안산역)" autocomplete="off">
    </div>
    <div class="suggest-list" id="suggest-list"></div>
    <div class="quick-stations">
      <div class="quick-chip" onclick="quickSelect('강남역')">강남역</div>
      <div class="quick-chip" onclick="quickSelect('홍대입구역')">홍대입구역</div>
      <div class="quick-chip" onclick="quickSelect('선릉역')">선릉역</div>
      <div class="quick-chip" onclick="quickSelect('잠실역')">잠실역</div>
      <div class="quick-chip" onclick="quickSelect('신촌역')">신촌역</div>
      <div class="quick-chip" onclick="quickSelect('판교역')">판교역</div>
    </div>
  </div>
  <div class="section">
    <div class="section-title">어떤 카페가 필요하세요?</div>
    <div class="filter-row" id="mood-filter">
      <div class="chip on" data-val="조용한">조용한</div>
      <div class="chip" data-val="감성">감성</div>
      <div class="chip" data-val="넓은">넓은</div>
      <div class="chip" data-val="오래 앉기 좋은">오래 앉기 좋은</div>
      <div class="chip" data-val="단체석">단체석</div>
    </div>
  </div>
  <div class="section">
    <div class="section-title">편의 조건</div>
    <div class="filter-row" id="cond-filter">
      <div class="chip on green" data-val="주차 가능">주차 가능</div>
      <div class="chip" data-val="콘센트">콘센트</div>
      <div class="chip" data-val="저가 (아아 3천원↓)">저가 (아아 3천원↓)</div>
    </div>
  </div>
  <div class="section">
    <div class="section-title">역/장소에서 도보</div>
    <div class="filter-row" id="walk-filter">
      <div class="chip" data-val="3">3분 이내</div>
      <div class="chip on" data-val="5">5분 이내</div>
      <div class="chip" data-val="10">10분 이내</div>
      <div class="chip" data-val="15">15분 이내</div>
    </div>
  </div>
  <div class="loading" id="loading"><div class="spinner"></div><div style="font-size:14px;color:#888" id="loading-text">카페를 찾는 중...</div></div>
  <div class="result-header" id="result-header"><div class="result-count" id="result-count"></div><div class="result-sub" id="result-sub"></div></div>
  <div class="cafe-list" id="cafe-list"></div>
  <div class="empty-state" id="empty-state"><div style="font-size:36px;margin-bottom:10px">☕</div><div>조건에 맞는 카페를 찾지 못했어요</div></div>
  <button class="share-btn" id="share-btn" onclick="shareApp()">친구에게 카페스팟 공유하기</button>
  <footer>카페스팟 · 미팅·상담하기 좋은 카페 추천 서비스</footer>
</div>
<div class="cta-wrap"><div class="cta-wrap-inner"><button class="cta-btn" id="find-btn" onclick="findCafe()">이 근처 카페 찾기</button></div></div>
<script>
document.getElementById('trust-num').textContent = (1200 + Math.floor(Math.random()*600)).toLocaleString('ko-KR');

document.querySelectorAll('.chip').forEach(function(chip) {
  chip.addEventListener('click', function() {
    var g = chip.closest('.filter-row');
    if (g.id === 'walk-filter') { g.querySelectorAll('.chip').forEach(function(c){c.classList.remove('on');}); chip.classList.add('on'); }
    else { chip.classList.toggle('on'); if (!chip.classList.contains('on')) chip.classList.remove('green'); }
  });
});

function getWalkMin() { var s = document.querySelector('#walk-filter .chip.on'); return s ? parseInt(s.dataset.val) : 10; }

var selLat = null, selLng = null, selName = null;
var suggestData = [];
var suggestTimer = null;

function quickSelect(name) {
  document.getElementById('location-input').value = name;
  hideSuggest();
  var ps = new kakao.maps.services.Places();
  ps.keywordSearch(name, function(data, status) {
    if (status === kakao.maps.services.Status.OK && data.length) {
      selLat = parseFloat(data[0].y);
      selLng = parseFloat(data[0].x);
      selName = data[0].place_name;
    }
  });
}

document.getElementById('location-input').addEventListener('input', function() {
  var val = this.value.trim();
  selLat = null; selLng = null; selName = null;
  clearTimeout(suggestTimer);
  if (!val) { hideSuggest(); return; }
  suggestTimer = setTimeout(function() {
    var ps = new kakao.maps.services.Places();
    ps.keywordSearch(val, function(data, status) {
      if (status !== kakao.maps.services.Status.OK || !data.length) { hideSuggest(); return; }
      suggestData = data.slice(0,5);
      var list = document.getElementById('suggest-list');
      list.innerHTML = suggestData.map(function(d,i) {
        return '<div class="suggest-item" onclick="pickSuggest('+i+')">' +
          '<div class="suggest-item-name">'+d.place_name+'</div>' +
          '<div class="suggest-item-addr">'+(d.road_address_name||d.address_name)+'</div></div>';
      }).join('');
      list.style.display = 'block';
    });
  }, 300);
});

function pickSuggest(i) {
  var d = suggestData[i];
  selLat = parseFloat(d.y); selLng = parseFloat(d.x); selName = d.place_name;
  document.getElementById('location-input').value = d.place_name;
  hideSuggest();
}

function hideSuggest() { document.getElementById('suggest-list').style.display = 'none'; }
document.addEventListener('click', function(e) { if (!e.target.closest('.search-box') && !e.target.closest('.suggest-list')) hideSuggest(); });

function findCafe() {
  var input = document.getElementById('location-input').value.trim();
  if (!input) { document.getElementById('location-input').style.borderColor='#E24B4A'; setTimeout(function(){document.getElementById('location-input').style.borderColor='';},1200); return; }

  function doSearch() {
    document.getElementById('find-btn').disabled = true;
    document.getElementById('loading').style.display = 'block';
    document.getElementById('loading-text').textContent = (selName||input) + ' 근처 카페를 찾는 중...';
    document.getElementById('cafe-list').style.display = 'none';
    document.getElementById('result-header').style.display = 'none';
    document.getElementById('empty-state').style.display = 'none';
    document.getElementById('share-btn').style.display = 'none';

    var walkMin = getWalkMin();
    var ps = new kakao.maps.services.Places();
    ps.categorySearch('CE7', function(data, status) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('find-btn').disabled = false;
      if (status !== kakao.maps.services.Status.OK || !data.length) { document.getElementById('empty-state').style.display='block'; return; }
      document.getElementById('result-header').style.display = 'flex';
      document.getElementById('result-count').textContent = (selName||input) + ' 근처 카페 ' + data.length + '곳';
      document.getElementById('result-sub').textContent = '도보 ' + walkMin + '분 이내';
      document.getElementById('cafe-list').style.display = 'flex';
      renderCafes(data);
      document.getElementById('share-btn').style.display = 'block';
    }, { location: new kakao.maps.LatLng(selLat, selLng), radius: walkMin*67, sort: kakao.maps.services.SortBy.DISTANCE });
  }

  if (selLat && selLng) {
    doSearch();
  } else {
    var ps = new kakao.maps.services.Places();
    ps.keywordSearch(input, function(data, status) {
      if (status === kakao.maps.services.Status.OK && data.length) {
        selLat = parseFloat(data[0].y); selLng = parseFloat(data[0].x); selName = data[0].place_name;
        doSearch();
      } else {
        alert('위치를 찾을 수 없어요. 다른 검색어를 입력해봐요.');
      }
    });
  }
}

function renderCafes(data) {
  var list = document.getElementById('cafe-list');
  list.innerHTML = '';
  data.forEach(function(p) {
    var distM = parseInt(p.distance);
    var distMin = Math.ceil(distM/67);
    var naverUrl = 'https://search.naver.com/search.naver?query=' + encodeURIComponent(p.place_name+' '+(p.road_address_name||p.address_name));
    var kakaoUrl = 'https://map.kakao.com/link/search/' + encodeURIComponent(p.place_name);
    var div = document.createElement('div');
    div.className = 'cafe-card';
    div.innerHTML =
      '<div class="cafe-card-top"><div class="cafe-name">'+p.place_name+'</div><div class="cafe-dist">도보 '+distMin+'분 (약 '+distM+'m)</div></div>' +
      '<div class="cafe-addr">'+(p.road_address_name||p.address_name)+'</div>' +
      '<div class="cafe-card-footer">' +
        '<a class="action-btn naver" href="'+naverUrl+'" target="_blank" rel="noopener">N 네이버 플레이스</a>' +
        '<a class="action-btn kakao" href="'+kakaoUrl+'" target="_blank" rel="noopener">카카오맵</a>' +
      '</div>';
    list.appendChild(div);
  });
}

function shareApp() {
  if (navigator.share) { navigator.share({title:'카페스팟',text:'미팅·상담 카페 찾을 때 써봐요!',url:location.href}); }
  else if (navigator.clipboard) { navigator.clipboard.writeText(location.href).then(function(){alert('링크가 복사됐어요!');}); }
}
</script>
</body>
</html>
